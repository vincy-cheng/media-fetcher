name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # TODO: Uncomment this once the workflow is working
  # validate:
  #   runs-on: ubuntu-22.04

  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0

  #     - name: Validate branch
  #       run: |
  #         git fetch origin main
  #         if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
  #           echo "Error: Tag must be created from the main branch."
  #           exit 1
  #         fi

  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # ARM Macs (M1+)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13" # Intel Macs
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "ubuntu-22.04-arm" # Only available in public repos.
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm" # Set this to npm, yarn or pnpm.

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ (matrix.platform == 'macos-latest' || matrix.platform == 'macos-13') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies (backend and frontend)
        run: |
          npm install
          npm install --prefix client

      - name: Download sidecar binaries for build target
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" == *"--target"* ]]; then
            TARGET_TRIPLE=$(echo "${{ matrix.args }}" | sed 's/.*--target[[:space:]]*//')
            bash scripts/download-binaries.sh "$TARGET_TRIPLE"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: media-fetch v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "Media Fetch v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
